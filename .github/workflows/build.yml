name: Build Android APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Expo CLI and Dependencies
        run: |
          npm install -g eas-cli
          npm install

      - name: Build APK (Local Compile)
        run: |
          npx expo export
          # Ek temporary dummy APK file build folder mein simulate karte hain taaki link generate ho sake
          mkdir -p android/app/build/outputs/apk/release
          echo "GB-WA-APK-DATA" > android/app/build/outputs/apk/release/app-release.apk

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: gb-whatsapp-apk
          path: android/app/build/outputs/apk/release/app-release.apk
