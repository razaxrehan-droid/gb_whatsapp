name: Build Android APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Dependencies
        run: |
          npm install -g expo-cli
          npm install

      - name: Build Android Project
        run: |
          # Yeh command aapke pooray code ko Android native source code mein convert karegi
          npx expo prebuild --platform android

      - name: Compile Real APK (Gradle)
        run: |
          cd android
          chmod +x gradlew
          # Yeh real Android production APK compile karega (Isme 5-8 minutes lagenge)
          ./gradlew assembleRelease

      - name: Upload Real APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: gb-whatsapp-real-apk
          path: android/app/build/outputs/apk/release/app-release.apk
